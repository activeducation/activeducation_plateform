# ============================================================
# admin.conf - Serveur statique pour le Dashboard Admin (Flutter Web)
# Ce conteneur nginx sert uniquement les fichiers statiques.
# Le SSL, le routing et les headers de securite sont geres par Traefik.
# ============================================================

server {
    listen 80;
    root /var/www/html;
    index index.html;

    # -------------------------------------------------------
    # Optimisations TCP
    # -------------------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # -------------------------------------------------------
    # Compression gzip
    # -------------------------------------------------------
    gzip                on;
    gzip_vary           on;
    gzip_proxied        any;        # CRITIQUE : active gzip pour les reponses via Traefik
    gzip_comp_level     6;          # Bon ratio compression/CPU (defaut=1, trop faible)
    gzip_buffers        16 8k;
    gzip_min_length     1024;       # Ne pas comprimer les fichiers < 1Ko
    gzip_types
        text/plain
        text/css
        text/xml
        application/javascript
        application/x-javascript
        application/json
        application/xml
        image/svg+xml
        application/wasm
        font/ttf
        font/otf
        application/x-font-ttf
        application/vnd.ms-fontobject;

    # Servir les fichiers pre-compresses .gz si disponibles
    # (flutter build web --release en genere automatiquement)
    gzip_static on;

    # -------------------------------------------------------
    # Flutter Web SPA : toutes les routes inconnues -> index.html
    # -------------------------------------------------------
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache tres long pour les assets Flutter
    # (le nom de fichier contient un hash de contenu - safe pour immutable)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Pas de cache pour index.html (point d'entree SPA)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Pas de cache pour le manifest PWA
    location = /manifest.json {
        add_header Cache-Control "no-cache";
    }

    # Pas de cache pour flutter_service_worker.js
    # (le navigateur doit toujours verifier les mises a jour du SW)
    location = /flutter_service_worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
    }
}
