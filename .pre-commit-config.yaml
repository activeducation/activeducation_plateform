repos:
  # ==========================================================================
  # Checks generaux
  # ==========================================================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        exclude: "^.*\\.md$"
      - id: end-of-file-fixer
        exclude: "^.*\\.md$"
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key
      - id: check-case-conflict

  # ==========================================================================
  # Backend Python
  # ==========================================================================
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        name: Format Python (black)
        files: ^backend/
        args: ["--line-length=100"]
        language_version: python3.11

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python (flake8)
        files: ^backend/
        args: ["--max-line-length=100", "--exclude=__pycache__,alembic/versions"]
        additional_dependencies: [flake8-bugbear, flake8-simplify]

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        name: Sort Python imports
        files: ^backend/
        args: ["--profile=black", "--line-length=100"]

  # ==========================================================================
  # Secrets
  # ==========================================================================
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        name: Detect secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "(.env.example|package-lock.json|poetry.lock)"

  # ==========================================================================
  # Conventional Commits (verifier le format des messages de commit)
  # ==========================================================================
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.20.0
    hooks:
      - id: commitizen
        stages: [commit-msg]
