name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy-prod" to confirm production deployment'
        required: true
        type: string
      skip_tests:
        description: 'Skip CI checks (emergency only)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  validate:
    name: Validate Input
    runs-on: ubuntu-latest
    steps:
      - name: Check confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy-prod" ]; then
            echo "❌ Invalid confirmation. You must type 'deploy-prod' to proceed."
            exit 1
          fi
          echo "✅ Confirmation validated"

  run-tests:
    name: Run Tests
    needs: validate
    if: github.event.inputs.skip_tests != 'true'
    uses: ./.github/workflows/backend-ci.yml

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [validate, run-tests]
    if: always() && needs.validate.result == 'success' && (needs.run-tests.result == 'success' || needs.run-tests.result == 'skipped')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/activeducation-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/activeducation-api:prod-${{ github.sha }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/activeducation-api:latest
          cache-to: type=inline

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Build app frontend
        working-directory: activ_education_app
        run: |
          flutter pub get
          flutter build web --release

      - name: Build admin frontend
        working-directory: admin_dashboard
        run: |
          flutter pub get
          flutter build web --release

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/activeducation
            git pull origin main
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/activeducation-api:latest
            docker compose up -d --no-build backend
            docker system prune -f

      - name: Sync frontend builds to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "activ_education_app/build/web/*,admin_dashboard/build/web/*"
          target: "/opt/activeducation/"

      - name: Production health check
        run: |
          sleep 20
          curl -f https://api.activeduhub.com/health || exit 1
          echo "✅ Production API is healthy"

      - name: Tag release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          release_name: Production Deploy ${{ github.run_number }}
          body: |
            Production deployment triggered by @${{ github.actor }}
            Commit: ${{ github.sha }}
            Date: ${{ github.event.head_commit.timestamp }}
          draft: false
          prerelease: false
