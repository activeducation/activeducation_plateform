name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "activ_education_app/**"
      - "admin_dashboard/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "activ_education_app/**"
      - "admin_dashboard/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  analyze-student-app:
    name: Analyze Student App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: activ_education_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-student-coverage
          path: activ_education_app/coverage/
          retention-days: 7

  analyze-admin-dashboard:
    name: Analyze Admin Dashboard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin_dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-web:
    name: Build Web (Student App)
    runs-on: ubuntu-latest
    needs: analyze-student-app
    defaults:
      run:
        working-directory: activ_education_app

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: flutter build web --release
