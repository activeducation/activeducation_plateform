name: Frontend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'activ_education_app/**'
      - 'admin_dashboard/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'activ_education_app/**'
      - 'admin_dashboard/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  analyze-app:
    name: Analyze & Test (App)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: activ_education_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: activ_education_app/coverage/lcov.info
          flags: flutter-app
          fail_ci_if_error: false

  build-app-web:
    name: Build App Web
    runs-on: ubuntu-latest
    needs: analyze-app

    defaults:
      run:
        working-directory: activ_education_app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=FLUTTER_WEB_USE_SKIA=true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-web-build-${{ github.sha }}
          path: activ_education_app/build/web/
          retention-days: 7

  analyze-admin:
    name: Analyze & Test (Admin)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin_dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --fatal-infos

      - name: Run tests
        run: flutter test

  build-admin-web:
    name: Build Admin Web
    runs-on: ubuntu-latest
    needs: analyze-admin

    defaults:
      run:
        working-directory: admin_dashboard

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build web
        run: |
          flutter build web \
            --release \
            --web-renderer canvaskit

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-web-build-${{ github.sha }}
          path: admin_dashboard/build/web/
          retention-days: 7
