name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  lint-and-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check app/ --output-format=github

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports

      # T1 — Bandit BLOQUANT (suppression du || true)
      - name: Security scan with Bandit
        run: |
          pip install bandit
          bandit -r app/ -ll -x app/tests --format json -o bandit-report.json || (cat bandit-report.json && exit 1)

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: backend/bandit-report.json
          retention-days: 7

      # T1 — Safety BLOQUANT (suppression du || true)
      - name: Vulnerability scan with Safety
        run: |
          pip install safety
          safety check -r requirements.txt --full-report

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-security
    defaults:
      run:
        working-directory: backend

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      # Test-only placeholders. Le backend refuse ces valeurs au demarrage
      # quand ENVIRONMENT=production (voir config.py validate_production_settings).
      ENVIRONMENT: testing
      SECRET_KEY: ${{ secrets.CI_SECRET_KEY || 'ci-test-secret-key-never-use-in-any-deployment-env-xx' }}
      SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL || 'https://ci-test.supabase.co' }}
      SUPABASE_KEY: ${{ secrets.CI_SUPABASE_KEY || 'ci-test-anon-key' }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY || 'ci-test-service-role-key' }}
      REDIS_URL: redis://localhost:6379/0
      GROQ_API_KEY: ${{ secrets.CI_GROQ_API_KEY || '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Seuil de couverture : cliquet progressif.
      # Baseline 2026-04-17 : 48.0% (Wave P7 — tests career_matcher 100%).
      # Augmenter par paliers quand le seuil est stable sur plusieurs PRs (objectif 70%).
      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=48 \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.xml
          retention-days: 7

  check-migrations:
    name: Check Alembic migrations
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check no pending migrations
        if: env.DATABASE_URL != ''
        run: alembic check

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t activeeducation-backend:ci ./backend
          echo "Docker build successful"
