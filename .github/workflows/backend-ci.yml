name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ --max-line-length=100 --exclude=__pycache__ --count --statistics

      - name: Format check with black
        run: |
          pip install black
          black --check app/ --line-length=100

      - name: Security scan with bandit (SAST)
        run: |
          pip install bandit
          bandit -r app/ -l -x app/tests/ --format txt -o bandit-report.txt
          cat bandit-report.txt
          echo "--- Bandit scan complete (BLOCKING) ---"

      - name: Dependency vulnerability check (safety)
        run: |
          pip install safety
          safety check -r requirements.txt --output text

      - name: Secret detection (truffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: Run tests with coverage
        env:
          SUPABASE_URL: https://placeholder.supabase.co
          SUPABASE_KEY: placeholder_key_for_testing_only
          SECRET_KEY: test_secret_key_with_at_least_64_characters_for_ci_pipeline_only_not_production_use
          ENVIRONMENT: development
          DEBUG: "true"
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: activeducation-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
