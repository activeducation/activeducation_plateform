# =============================================================================
# Alembic Configuration - ActivEducation
# =============================================================================
# Usage:
#   Creer une migration : alembic revision --autogenerate -m "description"
#   Appliquer migrations : alembic upgrade head
#   Voir l'etat        : alembic current
#   Rollback 1 step   : alembic downgrade -1
# =============================================================================

[alembic]
# Dossier des scripts de migration
script_location = alembic

# URL de connexion a la base Supabase PostgreSQL
# Format: postgresql://USER:PASSWORD@HOST:PORT/DATABASE
# En pratique: utiliser la variable d'environnement DATABASE_URL
# L'URL directe Supabase: dans Settings -> Database -> Connection string (direct)
sqlalchemy.url = postgresql://postgres:%(SUPABASE_DB_PASSWORD)s@%(SUPABASE_DB_HOST)s:5432/postgres

# Timezone
timezone = UTC

# Longueur max des noms de fichiers de migration
# (pour eviter les problemes sur Windows)
truncate_slug_length = 40

# Activer compare_type pour detecter les changements de type de colonnes
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
