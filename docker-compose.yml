services:

  # ============================================================
  # TRAEFIK - Reverse proxy + SSL automatique (Let's Encrypt)
  # Utilise le file provider (dynamic.yml) - pas de Docker API
  # Compatible avec Docker Engine 29.x (MinAPIVersion=1.40)
  # ============================================================
  traefik:
    image: traefik:v3.2
    container_name: activeducation-traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yml:/traefik.yml:ro           # Config statique
      - ./traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro  # Config dynamique (routes)
      - ./traefik/letsencrypt:/letsencrypt               # Stockage certificats SSL
    networks:
      - app-network
    security_opt:
      - no-new-privileges:true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ============================================================
  # REDIS - Cache en memoire
  # Accelere les listes statiques (ecoles, carrieres, tests)
  # ============================================================
  redis:
    image: redis:7.2-alpine
    container_name: activeducation-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
      --save ""
      --requirepass ${REDIS_PASSWORD}
    expose:
      - "6379"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ============================================================
  # BACKEND - API FastAPI
  # Accessible via : https://api.activeducationhub.com
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: activeducation-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env.production
    expose:
      - "8000"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ============================================================
  # APP-FRONTEND - Application Etudiante (Flutter Web statique)
  # Accessible via : https://activeducationhub.com
  # https://www.activeducationhub.com -> redirect vers activeducationhub.com
  #
  # MODE LANDING PAGE (en attendant le build Flutter) :
  #   volume: ./landing:/var/www/html:ro
  # MODE PRODUCTION (quand l'app Flutter est buildee) :
  #   volume: ./activ_education_app/build/web:/var/www/html:ro
  # ============================================================
  app-frontend:
    image: nginx:1.25-alpine
    container_name: activeducation-app
    restart: unless-stopped
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ./activ_education_app/build/web:/var/www/html:ro
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ============================================================
  # ADMIN-FRONTEND - Dashboard Administrateur (Flutter Web statique)
  # Accessible via : https://admin.activeducationhub.com
  # ============================================================
  admin-frontend:
    image: nginx:1.25-alpine
    container_name: activeducation-admin
    restart: unless-stopped
    volumes:
      - ./nginx/admin.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin_dashboard/build/web:/var/www/html:ro
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

networks:
  app-network:
    driver: bridge
