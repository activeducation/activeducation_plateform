# ============================================================
# ActivEducation - Traefik Configuration Statique
# ============================================================

# Interface Traefik - desactivee en production
api:
  dashboard: false

# File provider - routes definies dans dynamic.yml
# Pas de connexion Docker API (incompatible avec Docker 29.x MinAPIVersion=1.40)
providers:
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true   # Rechargement auto si le fichier change

# Points d'entree reseau
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true   # 301 Redirect HTTP -> HTTPS pour tous les domaines

  websecure:
    address: ":443"

# Gestionnaire de certificats SSL - Let's Encrypt automatique
certificatesResolvers:
  letsencrypt:
    acme:
      email: "ops@activeducationhub.com"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web   # Validation via HTTP sur port 80 (Traefik gere avant le redirect)

# Journalisation
log:
  level: INFO

# Journalisation des acces (optionnel - commenter pour reduire les logs)
accessLog: {}
